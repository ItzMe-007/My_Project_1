<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Admin</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f8fafc;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }

    .login-container {
      background: white;
      width: 100%;
      max-width: 420px;
      padding: 40px 35px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    .welcome {
      font-size: 22px;
      font-weight: 600;
      color: #1e2937;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #64748b;
      font-size: 15px;
      margin-bottom: 32px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #334155;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 16px;
      transition: all 0.3s;
    }

    input:focus {
      border-color: #4f46e5;
      outline: none;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.08);
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 24px;
      transition: background 0.3s;
    }

    .login-btn:hover {
      background: #4338ca;
    }
    .login-btn:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="welcome">Welcome back,</div>
    <div class="subtitle">Please login to your admin account.</div>
    <label for="username">Username</label>
    <input type="text" id="username" placeholder="Enter your username" value="Abigale">
    <label for="password" style="margin-top: 20px;">Password</label>
    <input type="password" id="password" placeholder="Enter your password" value="123456">
    <button class="login-btn" onclick="login()">Login</button>
  </div>
  <script>
    function login() {
      const username = document.getElementById('username').value.trim();
      if (username === "") {
        alert("Please enter your username");
        return;
      }
      window.location.href = "dashboard.html";
    }
  </script>
</body>
</html>
